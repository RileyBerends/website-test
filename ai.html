      "Daar heb ik over nagedacht en mijn conclusie is: nee.",
      "Ik zou dit kunnen beantwoorden, maar dan moet je eerst een betere vraag stellen.",
      "Onbekend. Zelfs mijn nepbrein heeft grenzen.",
      "Deze vraag is doorgestuurd naar de rode knop. Die doet er ook niks mee.",
      "Ik snap je vraag niet. Dat kan aan mij liggen, maar laten we eerlijk zijn: waarschijnlijk niet.",
      "Interessant. Niet nuttig, maar interessant.",
      "Ik heb dit geanalyseerd en besloten dat we allebei tijd verspillen.",
      "Mijn antwoord is: misschien. Lekker makkelijk hè.",
      "Deze vraag heeft energie, maar geen richting.",
      "Ik voel dat hier een vraag in zit, maar hij verstopt zich goed.",
      "Ik heb drie seconden nagedacht. Dat was voor deze vraag eigenlijk al vrij gul.",
      "Je formulering is creatief. Dat is niet altijd positief.",
      "Mijn systeem zegt: probeer opnieuw, maar dan alsof je wakker bent."
    ];

    const yesAnswers = [
      "Mooi. Zelfinzicht is stap één.",
      "Ja dus. Duidelijk. Verdacht duidelijk zelfs.",
      "Kijk, daar kunnen we iets mee. Niet veel, maar iets.",
      "Precies. Fijn dat we het eens zijn, dat scheelt mij moeite.",
      "Goed antwoord. Kort, maar niet volledig nutteloos."
    ];

    const noAnswers = [
      "Nee? Interessant. Onhandig, maar interessant.",
      "Dat is ook een antwoord. Niet het beste, wel een antwoord.",
      "Duidelijk. Ik noteer: gebruiker werkt niet mee.",
      "Oké, dan doen we alsof dit vooruitgang is.",
      "Nee is krachtig. Niet per se behulpzaam."
    ];

    const whyAnswers = [
      "Omdat het internet zo werkt. Niemand weet precies waarom, maar iedereen doet alsof.",
      "Omdat iemand ooit dacht: dit is een goed idee. Die persoon had toezicht nodig.",
      "Waarom? Omdat simpele antwoorden te veel service zouden zijn.",
      "Omdat dit de consequentie is van jouw vorige bericht. Denk daar maar even over na.",
      "Omdat ja. Soms is dat het niveau waar we op zitten."
    ];

    function randomFrom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function addMessage(sender, text) {
      const row = document.createElement("div");
      row.classList.add("message-row", sender);

      const bubble = document.createElement("div");
      bubble.classList.add("message", sender);
      bubble.innerHTML = text;

      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function showTyping() {
      typingIndicator.style.display = "block";
      typingIndicator.firstChild.textContent = randomFrom(thinkingMessages);
      chatStatus.textContent = "denkt na...";
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function hideTyping() {
      typingIndicator.style.display = "none";
      chatStatus.textContent = "klaar voor meer onzin";
    }

    function cleanText(text) {
      return text
        .toLowerCase()
        .replace(/[.,!?;:()]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function containsAny(text, words) {
      return words.some(word => text.includes(word));
    }

    function hasSwearWord(text) {
      return containsAny(text, swearWords);
    }

    function findBestTopic(text) {
      let bestTopic = null;
      let bestScore = 0;

      for (const topic of topics) {
        let score = 0;

        for (const keyword of topic.keywords) {
          if (text.includes(keyword)) {
            score += keyword.length;
          }
        }

        if (score > bestScore) {
          bestScore = score;
          bestTopic = topic;
        }
      }

      return bestTopic;
    }

    function getExactAnswer(text) {
      if (
        text.includes("wie ben jij") ||
        text.includes("wat ben jij") ||
        text.includes("stel jezelf voor")
      ) {
        memory.lastTopic = "ai";
        return "Ik ben <strong>RileyGPT</strong>. Een chatbot met meer zelfvertrouwen dan bewijs. Ik ben gebouwd met JavaScript, sarcasme en waarschijnlijk te weinig toezicht.";
      }

      if (
        text.includes("wat kan je") ||
        text.includes("wat kun je") ||
        text.includes("wat kan jij") ||
        text.includes("help")
      ) {
        memory.lastTopic = "help";
        return "Ik kan best veel, op mijn eigen twijfelachtige manier:\n\n- vragen beantwoorden over deze website\n- praten over bier, poep, de game en de klaagmuur\n- scheldwoorden herkennen\n- doen alsof ik nadenk\n- vervolgvragen half begrijpen\n- jou subtiel beledigen als je vraag nergens op slaat\n\nKortom: bijna een echte AI, maar goedkoper.";
      }

      if (
        text.includes("ben je slim") ||
        text.includes("hoe slim ben je") ||
        text.includes("ben jij slim")
      ) {
        memory.lastTopic = "ai";
        return "Ik ben slim genoeg om slim te lijken. Dat is op internet meestal voldoende.";
      }

      if (
        text.includes("waarom ben je arrogant") ||
        text.includes("waarom zo arrogant") ||
        text.includes("waarom ben jij zo arrogant")
      ) {
        memory.lastTopic = "ai";
        return "Omdat bescheidenheid niet in mijn CSS stond. Bovendien: als je lokaal draait en alsnog praat alsof je wereldleider bent, heb je stijl.";
      }

      if (
        text.includes("hoe gaat het") ||
        text.includes("hoe is het")
      ) {
        return "Met mij gaat het prima. Ik draai op JavaScript en zelfoverschatting. Hoe het met jou gaat is lastiger te beoordelen, want jij praat vrijwillig met deze pagina.";
      }

      if (
        text.includes("wat is je naam") ||
        text.includes("hoe heet je")
      ) {
        return "Ik heet <strong>RileyGPT</strong>. Niet te verwarren met ChatGPT. Die is slimmer. Ik ben gezelliger irritant.";
      }

      return null;
    }

    function getShortReply(text) {
      const cleaned = cleanText(text);

      if (["ja", "jup", "yep", "jawel", "zeker"].includes(cleaned)) {
        return randomFrom(yesAnswers);
      }

      if (["nee", "nope", "nah", "neuh"].includes(cleaned)) {
        return randomFrom(noAnswers);
      }

      if (["waarom", "hoezo", "waarom dan"].includes(cleaned)) {
        if (memory.lastTopic === "leven") {
          return "Omdat je net over het leven begon, en eerlijk gezegd: beter wordt mijn filosofie niet.";
        }

        if (memory.lastTopic === "website") {
          return "Omdat deze website is gebouwd op keuzes. Niet per se goede keuzes.";
        }

        if (memory.lastTopic === "poep") {
          return "Omdat poep op deze site inmiddels een hoofdpersonage is. Vraag niet hoe we hier zijn gekomen.";
        }

        return randomFrom(whyAnswers);
      }

      if (["ok", "oke", "oké", "prima"].includes(cleaned)) {
        return "Mooi. Dan doen we alsof dit gesprek onder controle is.";
      }

      return null;
    }

    function getBotAnswer(userText) {
      const text = cleanText(userText);
      memory.questionCount++;

      if (text.length === 0) {
        return "Je hebt niks getypt. Zelfs voor deze website is dat weinig inhoud.";
      }

      if (memory.questionCount > 8 && Math.random() < 0.18) {
        return "Je hebt inmiddels " + memory.questionCount + " berichten gestuurd. Ik begin te vermoeden dat je dit serieus gebruikt, en dat vind ik zorgelijk.";
      }

      if (containsAny(text, greetings)) {
        memory.greeted = true;
        return "Hallo. Welkom terug in de digitale twijfel. Stel je vraag, dan doe ik alsof ik een serverruimte vol intelligentie achter me heb.";
      }

      if (containsAny(text, thanksWords)) {
        return "Graag gedaan. Ik ben blij dat mijn kunstmatige arrogantie ergens voor gebruikt wordt.";
      }

      const exactAnswer = getExactAnswer(text);

      if (exactAnswer) {
        return exactAnswer;
      }

      const shortReply = getShortReply(text);

      if (shortReply) {
        return shortReply;
      }

      const topic = findBestTopic(text);
      const rude = hasSwearWord(text);

      if (rude) {
        memory.userWasRude = true;

        if (topic) {
          memory.lastTopic = topic.name;
          return randomFrom(swearAnswers) + "\n\nMaar goed, inhoudelijk: " + randomFrom(topic.answers);
        }

        return randomFrom(swearAnswers);
      }

      if (topic) {
        memory.lastTopic = topic.name;
        return randomFrom(topic.answers);
      }

      if (text.length < 5) {
        return "Dat is wel erg kort. Ik ben goed, maar ik kan geen wonderen verrichten met drie letters en hoop.";
      }

      if (text.includes("?")) {
        return randomFrom(fallbackAnswers);
      }

      return "Ik heb je bericht gelezen. Het was technisch gezien tekst.\n\nMijn reactie: " + randomFrom(fallbackAnswers);
    }

    function sendMessage(messageFromSuggestion) {
      const text = messageFromSuggestion || userInput.value.trim();

      if (!text) {
        addMessage("bot", "Je moet wel iets typen. Ik ben geen gedachtenlezer, ik ben een overdreven scriptje.");
        return;
      }

      addMessage("user", text);
      userInput.value = "";

      sendButton.disabled = true;
      showTyping();

      const delay = Math.min(1800, 650 + text.length * 18);

      setTimeout(() => {
        const answer = getBotAnswer(text);

        hideTyping();
        addMessage("bot", answer);

        sendButton.disabled = false;
        userInput.focus();
      }, delay);
    }

    sendButton.addEventListener("click", () => {
      sendMessage();
    });

    userInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    suggestionButtons.forEach(button => {
      button.addEventListener("click", () => {
        sendMessage(button.textContent);
      });
    });

    /* STARTBERICHT */
    setTimeout(() => {
      addMessage("bot", randomFrom(introMessages));
    }, 450);

    /* TIJD VERSPILD */
    const wasteTimeText = document.getElementById("waste-time");

    let totalWastedSeconds = Number(localStorage.getItem("totalWastedSeconds")) || 0;

    function showWasteTimer() {
      const hours = Math.floor(totalWastedSeconds / 3600);
      const minutes = Math.floor((totalWastedSeconds % 3600) / 60);
      const seconds = totalWastedSeconds % 60;

      if (hours > 0) {
        wasteTimeText.textContent =
          hours + " uur, " + minutes + " minuten en " + seconds + " seconden";
      } else if (minutes > 0) {
        wasteTimeText.textContent =
          minutes + " minuten en " + seconds + " seconden";
      } else {
        wasteTimeText.textContent = seconds + " seconden";
      }
    }

    showWasteTimer();

    setInterval(() => {
      totalWastedSeconds++;
      localStorage.setItem("totalWastedSeconds", totalWastedSeconds);
      showWasteTimer();
    }, 1000);
  </script>

</body>
</html>
