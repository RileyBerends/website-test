<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riley Berends</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      overflow-x: hidden;
    }

    /* LAADSCHERM */
    #loader {
      position: fixed;
      inset: 0;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }

    .loader-box {
      text-align: center;
      width: 80%;
      max-width: 500px;
    }

    .loader-box h1 {
      font-size: 42px;
      margin-bottom: 10px;
      color: #60a5fa;
    }

    .loader-box p {
      color: #d1d5db;
      margin-bottom: 25px;
    }

    .bar-background {
      width: 100%;
      height: 24px;
      background: #374151;
      border-radius: 999px;
      overflow: visible;
      position: relative;
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #60a5fa, #22d3ee);
      border-radius: 999px;
      transition: width 0.08s linear;
    }

    #percentage {
      margin-top: 18px;
      font-size: 28px;
      font-weight: bold;
    }

    .fade-joke {
      display: inline-block;
      animation: fadeAway 1.1s ease forwards;
    }

    .keep-69 {
      display: inline-block;
      color: #facc15;
      transform: scale(1.15);
      transition: color 0.4s ease, transform 0.4s ease;
    }

    @keyframes fadeAway {
      from {
        opacity: 1;
        filter: blur(0);
      }

      to {
        opacity: 0;
        filter: blur(6px);
      }
    }

    .loader-hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* HOOFDPAGINA */
    #main-content {
      display: none;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 650px;
      margin: 0 auto;
      padding: 40px 0;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 12px;
    }

    p {
      font-size: 19px;
      color: #e5e7eb;
      margin-bottom: 35px;
    }

    .menu {
      display: grid;
      gap: 18px;
    }

    .menu a {
      display: block;
      background: white;
      color: #111827;
      text-decoration: none;
      padding: 22px;
      border-radius: 18px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .menu a:hover {
      transform: scale(1.04);
      box-shadow: 0 16px 35px rgba(0,0,0,0.3);
    }

    .menu a span {
      display: block;
      font-size: 14px;
      font-weight: normal;
      color: #6b7280;
      margin-top: 6px;
    }

    footer {
      margin-top: 35px;
      font-size: 14px;
      color: #d1d5db;
    }

    @media (max-width: 600px) {
      .loader-box h1 {
        font-size: 34px;
      }

      #percentage {
        font-size: 24px;
      }

      h1 {
        font-size: 38px;
      }

      p {
        font-size: 16px;
      }

      .menu a {
        font-size: 19px;
        padding: 19px;
      }
    }
  </style>
</head>

<body>

  <!-- Laadscherm -->
  <div id="loader">
    <div class="loader-box">
      <h1>Riley Berends</h1>
      <p>Website wordt geladen...</p>

      <div class="bar-background">
        <div class="bar-fill" id="bar"></div>
      </div>

      <div id="percentage">0%</div>
    </div>
  </div>

  <!-- Hoofdpagina -->
  <div id="main-content">
    <div class="container">
      <h1>Welkom op mijn website</h1>
      <p>De website is nog in ontwikkeling. Heb geduld persoon :)</p>

      <div class="menu">
        <a href="poepgame.html">
          💩 Poepgame
          <span>Klik op de vliegende poepjes</span>
        </a>

        <a href="rickroll.html">
          🎵 Niet klikken
          <span>Deze knop is absoluut niet verdacht</span>
        </a>
      </div>

      <footer>
        © 2026 Riley Berends ~ Gemaakt met heel veel schik en bier
      </footer>
    </div>
  </div>

  <script>
    let percentage = 0;
    let jokeStarted = false;

    const bar = document.getElementById("bar");
    const percentageText = document.getElementById("percentage");
    const loader = document.getElementById("loader");
    const mainContent = document.getElementById("main-content");

    const loading = setInterval(() => {
      percentage++;

      percentageText.textContent = percentage + "%";
      bar.style.width = percentage + "%";

      if (percentage >= 169 && jokeStarted === false) {
        jokeStarted = true;
        clearInterval(loading);

        // Hier gebeurt de 169% naar 69 grap
        percentageText.innerHTML =
          '<span class="fade-joke">1</span><span class="keep-69">69</span><span class="fade-joke">%</span>';

        setTimeout(() => {
          loader.classList.add("loader-hidden");
          mainContent.style.display = "flex";
        }, 1500);
      }
    }, 35);
  </script>

</body>
</html>
