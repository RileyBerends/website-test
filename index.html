<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riley Berends</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 650px;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 12px;
    }

    p {
      font-size: 19px;
      color: #e5e7eb;
      margin-bottom: 35px;
    }

    .menu {
      display: grid;
      gap: 18px;
    }

    .menu a {
      display: block;
      background: white;
      color: #111827;
      text-decoration: none;
      padding: 22px;
      border-radius: 18px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .menu a:hover {
      transform: scale(1.04);
      box-shadow: 0 16px 35px rgba(0,0,0,0.3);
    }

    .menu a span {
      display: block;
      font-size: 14px;
      font-weight: normal;
      color: #6b7280;
      margin-top: 6px;
    }

    footer {
      margin-top: 35px;
      font-size: 14px;
      color: #d1d5db;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 38px;
      }

      p {
        font-size: 16px;
      }

      .menu a {
        font-size: 19px;
        padding: 19px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welkom op mijn website</h1>
    <p>De website is nog in ontwikkeling. Heb geduld persoon :)</p>

    <div class="menu">
      <a href="poepgame.html">
        💩 Poepgame
        <span>Klik op de vliegende poepjes</span>
      </a>

      <a href="rickroll.html">
        🎵 Niet klikken
        <span>Deze knop is absoluut niet verdacht</span>
      </a>
    </div>

    <footer>
      © 2026 Riley Berends ~ Gemaakt met heel veel schik en bier
    </footer>
  </div>
</body>
</html>
