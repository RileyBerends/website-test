<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poepgame</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
      overflow-x: hidden;
    }

    header {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      text-align: center;
      padding: 70px 20px;
    }

    header h1 {
      font-size: 48px;
      margin: 0;
    }

    header p {
      font-size: 20px;
      margin-top: 15px;
    }

    .back-button {
      position: fixed;
      top: 18px;
      left: 18px;
      background: white;
      color: #111827;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: bold;
      z-index: 5002;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .back-button:hover {
      transform: scale(1.05);
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .info-box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .info-box h2 {
      color: #2563eb;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #666;
    }

    /* POEP CLICKER */
    #poop {
      position: fixed;
      left: 50px;
      top: 50px;
      font-size: 48px;
      cursor: pointer;
      z-index: 5000;
      user-select: none;
      transition:
        left 1.8s ease-in-out,
        top 1.8s ease-in-out,
        transform 0.15s ease;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.25));
    }

    #poop:hover {
      transform: scale(1.2) rotate(10deg);
    }

    #poop:active {
      transform: scale(0.9) rotate(-10deg);
    }

    #poop-counter {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #111827;
      color: white;
      padding: 16px 22px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      z-index: 5001;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    #poop-counter span {
      color: #facc15;
    }

    .plus-one {
      position: fixed;
      font-size: 24px;
      font-weight: bold;
      color: #7c3aed;
      z-index: 6000;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
    }

    @keyframes floatUp {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateY(-50px) scale(1.5);
      }
    }

    /* ACHIEVEMENT */
    #achievement {
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 18px 24px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: bold;
      z-index: 7000;
      display: none;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      animation: achievementPop 0.4s ease-out;
      text-align: center;
    }

    #achievement span {
      color: #facc15;
    }

    #achievement:hover {
      transform: translateX(-50%) scale(1.05);
    }

    @keyframes achievementPop {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(30px) scale(0.8);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }

    @media (max-width: 600px) {
      .back-button {
        top: 12px;
        left: 12px;
        padding: 10px 14px;
        font-size: 14px;
      }

      header {
        padding: 65px 16px 50px;
      }

      header h1 {
        font-size: 36px;
      }

      header p {
        font-size: 17px;
      }

      main {
        margin: 25px auto;
        padding: 0 14px;
      }

      .info-box {
        padding: 22px;
      }

      #poop {
        font-size: 42px;
      }

      #poop-counter {
        top: 12px;
        right: 12px;
        padding: 12px 16px;
        font-size: 15px;
        border-radius: 12px;
      }

      #achievement {
        width: calc(100% - 50px);
        bottom: 20px;
        font-size: 15px;
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- Terugknop -->
  <a class="back-button" href="index.html">← Terug</a>

  <!-- Poep clicker -->
  <div id="poop-counter">
    💩 Poepjes: <span id="poop-count">0</span>
  </div>

  <div id="achievement">
    🏆 Achievement unlocked<br>
    <span>Jij hebt echt geen leven......</span>
  </div>

  <div id="poop">💩</div>

  <header>
    <h1>Poepgame</h1>
    <p>Klik op de vliegende poep. Waarom? Geen idee.</p>
  </header>

  <main>
    <div class="info-box">
      <h2>Doel</h2>
      <p>Haal 100 poepjes en ontgrendel een totaal nutteloze achievement.</p>
    </div>
  </main>

  <footer>
    © 2026 Riley Berends ~ Gemaakt met heel veel schik en bier
  </footer>

  <script>
    const poop = document.getElementById("poop");
    const poopCounter = document.getElementById("poop-counter");
    const poopCountText = document.getElementById("poop-count");
    const achievement = document.getElementById("achievement");

    let poopCount = 0;
    let achievementUnlocked = false;

    function movePoop() {
      const poopSize = 70;

      const maxX = window.innerWidth - poopSize;
      const maxY = window.innerHeight - poopSize;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      poop.style.left = randomX + "px";
      poop.style.top = randomY + "px";
    }

    movePoop();
    setInterval(movePoop, 1800);

    poop.addEventListener("click", () => {
      poopCount++;
      poopCountText.textContent = poopCount;

      poopCounter.style.display = "block";

      if (poopCount >= 100 && achievementUnlocked === false) {
        achievementUnlocked = true;
        achievement.style.display = "block";
      }

      const plusOne = document.createElement("div");
      plusOne.className = "plus-one";
      plusOne.textContent = "+1 💩";

      const poopRect = poop.getBoundingClientRect();
      plusOne.style.left = poopRect.left + 20 + "px";
      plusOne.style.top = poopRect.top + "px";

      document.body.appendChild(plusOne);

      setTimeout(() => {
        plusOne.remove();
      }, 800);

      movePoop();
    });

    achievement.addEventListener("click", () => {
      window.location.href = "poep.html";
    });
  </script>

</body>
</html>
