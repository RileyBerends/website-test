<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poep</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .grote-poep {
      font-size: 260px;
      user-select: none;
      animation: zitDaar 2s ease-in-out infinite;
      filter: drop-shadow(0 18px 18px rgba(0,0,0,0.25));
    }

    @keyframes zitDaar {
      0% {
        transform: scale(1) rotate(-2deg);
      }

      50% {
        transform: scale(1.06) rotate(2deg);
      }

      100% {
        transform: scale(1) rotate(-2deg);
      }
    }

    @media (max-width: 600px) {
      .grote-poep {
        font-size: 160px;
      }
    }
  </style>
</head>

<body>
  <div class="grote-poep">💩</div>
</body>
</html>
