    /* ALGEMEEN */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #7c3aed);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      width: 90%;
      max-width: 750px;
      padding: 40px 0;
    }

    h1 {
      font-size: 46px;
      margin-bottom: 12px;
      color: #facc15;
    }

    p {
      color: #d1d5db;
      font-size: 18px;
      margin-bottom: 30px;
    }

    /* TIJD VERSPILD */
    #waste-timer {
      position: fixed;
      left: 18px;
      bottom: 18px;
      background: rgba(17, 24, 39, 0.9);
      color: white;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: bold;
      z-index: 9000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    #waste-time {
      color: #facc15;
    }

    /* TERUGKNOP */
    .back-button {
      position: fixed;
      top: 18px;
      left: 18px;
      background: white;
      color: #111827;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: bold;
      z-index: 5002;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }

    .back-button:hover {
      transform: scale(1.05);
    }

    /* DE KNOP */
    #useless-button {
      background: #ef4444;
      color: white;
      border: none;
      padding: 28px 42px;
      border-radius: 22px;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 16px 38px rgba(0,0,0,0.35);
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    #useless-button:hover {
      transform: scale(1.05);
      background: #dc2626;
    }

    #useless-button:active {
      transform: scale(0.92) rotate(-2deg);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .button-jump {
      animation: buttonJump 0.35s ease;
    }

    @keyframes buttonJump {
      0% {
        transform: scale(1) rotate(0deg);
      }

      30% {
        transform: scale(0.9) rotate(-4deg);
      }

      60% {
        transform: scale(1.12) rotate(4deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    /* TEKST NA KLIK */
    #button-message {
      min-height: 40px;
      margin-top: 28px;
      font-size: 22px;
      font-weight: bold;
      color: #facc15;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    #button-message.show {
      opacity: 1;
    }

    #button-message.hide {
      opacity: 0;
    }

    /* MOBIEL */
    @media (max-width: 600px) {
      #waste-timer {
        left: 12px;
        bottom: 12px;
        font-size: 12px;
        padding: 10px 12px;
      }

      .back-button {
        top: 12px;
        left: 12px;
        padding: 10px 14px;
        font-size: 14px;
      }

      h1 {
        font-size: 34px;
      }

      p {
        font-size: 16px;
      }

      #useless-button {
        width: 100%;
        font-size: 23px;
        padding: 24px 20px;
      }

      #button-message {
        font-size: 19px;
      }

      .container {
        padding-bottom: 80px;
      }
    }
  </style>
</head>

      uselessButton.classList.remove("button-jump");
      void uselessButton.offsetWidth;
      uselessButton.classList.add("button-jump");

      buttonMessage.textContent = randomMessage;
      buttonMessage.classList.remove("hide");
      buttonMessage.classList.add("show");

      clearTimeout(messageTimeout);

      messageTimeout = setTimeout(() => {
        buttonMessage.classList.remove("show");
        buttonMessage.classList.add("hide");
      }, 3000);
    });

    /* TIJD VERSPILD */
    const wasteTimeText = document.getElementById("waste-time");

    let totalWastedSeconds = Number(localStorage.getItem("totalWastedSeconds")) || 0;

    function showWasteTimer() {
      const hours = Math.floor(totalWastedSeconds / 3600);
      const minutes = Math.floor((totalWastedSeconds % 3600) / 60);
      const seconds = totalWastedSeconds % 60;

      if (hours > 0) {
        wasteTimeText.textContent =
          hours + " uur, " + minutes + " minuten en " + seconds + " seconden";
      } else if (minutes > 0) {
        wasteTimeText.textContent =
          minutes + " minuten en " + seconds + " seconden";
      } else {
        wasteTimeText.textContent = seconds + " seconden";
      }
    }

    showWasteTimer();

    setInterval(() => {
      totalWastedSeconds++;
      localStorage.setItem("totalWastedSeconds", totalWastedSeconds);
      showWasteTimer();
    }, 1000);
